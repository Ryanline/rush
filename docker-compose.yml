services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rush
      POSTGRES_USER: rush
      POSTGRES_PASSWORD: rush
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rush -d rush"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    environment:
      PORT: 3001
      HOST: 0.0.0.0
      NODE_ENV: production
      JWT_SECRET: dev_change_me_to_a_long_random_string
      JWT_EXPIRES_IN: 7d
      CORS_ORIGINS: http://localhost:8080
      DATABASE_URL: postgresql://rush:rush@db:5432/rush?schema=public
    command: sh -c "npm run prisma:migrate:deploy --workspace api && npm run start --workspace api"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3001"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: http://localhost:3001
        VITE_WS_URL: ws://localhost:3001/ws
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  pgdata:
