name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: rush
          POSTGRES_USER: rush
          POSTGRES_PASSWORD: rush
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U rush -d rush"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql://rush:rush@localhost:5432/rush?schema=public
      JWT_SECRET: dev_ci_secret_value_that_is_long_enough
      JWT_EXPIRES_IN: 7d
      CORS_ORIGINS: http://localhost:5173
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate --workspace api

      - name: Apply migrations
        run: npm run prisma:migrate:deploy --workspace api

      - name: Web lint
        run: npm run lint --workspace web

      - name: Web build
        run: npm run build --workspace web

      - name: API typecheck
        run: npm run build --workspace api

      - name: API tests
        run: npm run test --workspace api
