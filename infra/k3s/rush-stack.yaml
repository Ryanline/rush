apiVersion: v1
kind: Namespace
metadata:
  name: rush
---
apiVersion: v1
kind: Service
metadata:
  name: rush-postgres
  namespace: rush
spec:
  selector:
    app: rush-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rush-postgres
  namespace: rush
spec:
  serviceName: rush-postgres
  replicas: 1
  selector:
    matchLabels:
      app: rush-postgres
  template:
    metadata:
      labels:
        app: rush-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 8Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rush-api
  namespace: rush
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rush-api
  template:
    metadata:
      labels:
        app: rush-api
    spec:
      initContainers:
        - name: migrate
          image: ryanline/rush-api:latest
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: rush-api-secret
          command: ["sh", "-c", "npm run prisma:migrate:deploy --workspace api"]
      containers:
        - name: api
          image: ryanline/rush-api:latest
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: rush-api-secret
          ports:
            - containerPort: 3001
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: rush-api
  namespace: rush
spec:
  selector:
    app: rush-api
  ports:
    - name: http
      protocol: TCP
      port: 3001
      targetPort: 3001
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rush-api
  namespace: rush
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - rush-api-ryan.duckdns.org
      secretName: rush-api-tls
  rules:
    - host: rush-api-ryan.duckdns.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rush-api
                port:
                  number: 3001
