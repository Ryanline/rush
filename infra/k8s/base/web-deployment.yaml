apiVersion: apps/v1
kind: Deployment
metadata:
  name: rush-web
  namespace: rush
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rush-web
  template:
    metadata:
      labels:
        app: rush-web
    spec:
      containers:
        - name: web
          image: ghcr.io/your-org/rush-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
