apiVersion: apps/v1
kind: Deployment
metadata:
  name: rush-api
  namespace: rush
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rush-api
  template:
    metadata:
      labels:
        app: rush-api
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/rush-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: HOST
              value: "0.0.0.0"
            - name: NODE_ENV
              value: "production"
            - name: CORS_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: rush-secrets
                  key: CORS_ORIGINS
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: rush-secrets
                  key: JWT_SECRET
            - name: JWT_EXPIRES_IN
              value: "7d"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: rush-secrets
                  key: DATABASE_URL
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 15
